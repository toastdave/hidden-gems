services:
  postgres:
    image: postgres:17.9-alpine3.23
    container_name: hidden-gems-postgres
    environment:
      POSTGRES_DB: hidden_gems
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hidden_gems']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: hidden-gems-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint:
      [
        '/bin/sh',
        '-c',
        'until mc alias set local http://minio:9000 minio minio123; do sleep 1; done; mc mb -p local/hidden-gems || true'
      ]
    restart: 'no'

  mailpit:
    image: axllent/mailpit:v1.29.4
    container_name: hidden-gems-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: hidden-gems-web
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hidden_gems
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailpit
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - '7411:7411'
    volumes:
      - .:/app
      - /app/node_modules
    command: bun run dev -- --host 0.0.0.0 --port 7411

volumes:
  postgres-data:
  minio-data:
